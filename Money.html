<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Money Manager App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Money Manager</h1>

  <div class="summary">
    <div>Income: ₹<span id="income">0</span></div>
    <div>Expense: ₹<span id="expense">0</span></div>
    <div>Balance: ₹<span id="balance">0</span></div>
  </div>

  <button id="openForm">+ Add Transaction</button>


  <div id="popup" class="popup hidden">
    <form id="transactionForm">
      <h2>Add Transaction</h2>

      <input type="number" id="amount" placeholder="Amount">
      <span class="error" id="amountError"></span>

      <input type="date" id="date">
      <span class="error" id="dateError"></span>

      <div>
        <label><input type="radio" name="type" value="income"> Income</label>
        <label><input type="radio" name="type" value="expense"> Expense</label>
      </div>
      <span class="error" id="typeError"></span>

      <select id="subcategory">
        <option value="">Select Subcategory</option>
      </select>
      <span class="error" id="subError"></span>

      <input type="text" id="desc" placeholder="Description">

      <button type="submit">Save</button>
      <button type="button" id="closeForm">Cancel</button>
    </form>
  </div>


  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Type</th>
        <th>Subcategory</th>
        <th>Description</th>
        <th>Amount</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

  <script src="app.js"></script>
</body>
</html>
